name: Gemini Agent

on:
  issue_comment:
    types: [created]

# Grant permission to read code, write commits, and create PRs
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gemini_fix:
    name: Generate Code and PR
    # ONLY run if the comment starts with "@gemini"
    if: startsWith(github.event.comment.body, '@gemini')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Gemini SDK
        run: pip install google-genai

      - name: Run Gemini Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: python .github/scripts/gemini_pr_agent.py

      - name: Commit Changes and Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub provides this automatically
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 1. Check if the python script actually changed any files
          if [[ -z $(git status -s) ]]; then
            echo "No changes were made by Gemini."
            gh issue comment $ISSUE_NUMBER --body "I reviewed the issue but couldn't determine any code changes to make."
            exit 0
          fi

          # 2. Configure Git user
          git config --global user.name "gemini-bot[bot]"
          git config --global user.email "gemini-bot[bot]@users.noreply.github.com"

          # 3. Create a new branch
          BRANCH_NAME="gemini-fix-issue-${ISSUE_NUMBER}"
          git checkout -b $BRANCH_NAME

          # 4. Commit the files modified by the Python script
          git add .
          git commit -m "Automated fix for issue #${ISSUE_NUMBER} via Gemini AI"
          git push origin $BRANCH_NAME

          # 5. Create the Pull Request using the GitHub CLI
          gh pr create \
            --title "🤖 Gemini Auto-Fix: Issue #${ISSUE_NUMBER}" \
            --body "This PR was automatically generated by Gemini in response to Issue #${ISSUE_NUMBER}." \
            --base main \
            --head $BRANCH_NAME
            
          # 6. Notify the user on the original issue
          gh issue comment $ISSUE_NUMBER --body "I have generated a fix! Please review the PR here: branch \`$BRANCH_NAME\`"